        </div>
      </div>
    `;
    return `<div class="expand-panel">${inner}</div>`;
  }

  if (item.postExcerpt) inner += `<div class="expand-post">${item.postExcerpt}</div>`;
  if (item.status === 'replied' && item.adminReply) {
    inner += renderReplyQuote(item);
  }

  inner += `
    <div class="composer">
      <div class="composer-label" style="display:flex; align-items:center; justify-content:space-between;">
        <span>ตอบกลับในนามเพจ ${page.emoji} ${page.name}</span>
        <span style="display:flex; gap:6px;">
          <span class="btn" style="padding:4px 9px; font-size:11px;" data-action="insert-signature" data-id="${item.id}">${ICONS.copy} แทรกลายเซ็น</span>
        </span>
      </div>
      <textarea id="replyBox-${item.id}" placeholder="พิมพ์ข้อความตอบกลับ... (ต้องใช้สรรพนาม “${page.pronoun}” สำหรับเพจนี้)">${signatureFor(page)}</textarea>
      <div id="composerAlertZone-${item.id}"></div>
      <div class="composer-foot">
        <div class="composer-rules">สรรพนาม: <b>${page.pronoun}</b> &nbsp;·&nbsp; คำลงท้าย: <b>${page.ending}</b> &nbsp;·&nbsp; แฮชแท็กของคุณ: <b>${myHashtagFor(page.id) || '(ยังไม่ตั้ง)'}</b></div>
        <div class="composer-actions">
          <button class="btn" data-action="collapse" data-id="${item.id}">ยกเลิก</button>
          <button class="btn" id="sendArchiveBtn-${item.id}" data-action="send-archive" data-id="${item.id}">${ICONS.archive} ตอบกลับและจัดเก็บ</button>
          <button class="btn primary" id="sendBtn-${item.id}" data-action="send" data-id="${item.id}">${ICONS.send} ส่งข้อความ</button>
        </div>
      </div>
    </div>
  `;

  return `<div class="expand-panel">${inner}</div>`;
}

function renderRow(item){
  const page = pageById(item.pageId);
  const checked = state.selected.has(item.id);
  const expanded = state.expandedId === item.id;

  return `
    <div>
      <div class="row ${item.status === 'spam_hidden' ? 'dim' : ''}">
        <div class="row-check"><input type="checkbox" ${checked ? 'checked' : ''} data-action="toggle-select" data-id="${item.id}" /></div>
        <div class="row-meta">
          <div class="name">${item.author}</div>
          <div class="time">${item.time}</div>
          <div class="page"><span class="dot" style="background:${page.color}"></span>${page.emoji} ${page.name}</div>
        </div>
        <div class="row-content">
          <div class="row-text">${item.text}${tagFor(item)}</div>
          <div class="copy-link" data-action="copy" data-id="${item.id}">${ICONS.copy} Copy to clipboard</div>
          ${item.status === 'replied' && item.adminReply ? renderReplyQuote(item) : ''}
        </div>
        <div class="row-actions">${rowActions(item)}</div>
      </div>
      ${expanded ? renderExpandPanel(item) : ''}
    </div>
  `;
}

/* ============================================================
   RENDER: LIST
============================================================ */
function renderList(){
  const items = visibleItems();
  if (!items.length) {
    return `
      <div class="empty">
        ${ICONS.inbox}
        <div class="t">ไม่มีรายการในมุมมองนี้</div>
      </div>
    `;
  }
  const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
  // เผื่อรายการลดลงจนหน้าปัจจุบันเกินขอบเขต (เช่น ลบ/ย้ายรายการจนหน้าสุดท้ายว่างไปแล้ว)
  if (state.page > totalPages) state.page = totalPages;
  const start = (state.page - 1) * PAGE_SIZE;
  const pageItems = items.slice(start, start + PAGE_SIZE);
  return pageItems.map(renderRow).join('') + renderPagination(totalPages);
}

function renderPagination(totalPages){
  if (totalPages <= 1) return '';
  const prevDisabled = state.page <= 1;
  const nextDisabled = state.page >= totalPages;
  let numbers = '';
  for (let p = 1; p <= totalPages; p++) {
    numbers += `<span class="btn ${p === state.page ? 'primary' : ''}" data-action="goto-page" data-page="${p}">${p}</span>`;
  }
  return `
    <div class="pagination" style="display:flex; align-items:center; justify-content:center; gap:6px; padding:18px 0 6px;">
      <span class="btn${prevDisabled ? ' disabled' : ''}" data-action="goto-page" data-page="${state.page - 1}" style="${prevDisabled ? 'opacity:.4; pointer-events:none;' : ''}">‹</span>
      ${numbers}
      <span class="btn${nextDisabled ? ' disabled' : ''}" data-action="goto-page" data-page="${state.page + 1}" style="${nextDisabled ? 'opacity:.4; pointer-events:none;' : ''}">›</span>
    </div>
  `;
}

/* ============================================================
   ROOT RENDER
============================================================ */
function render(){
  const app = document.getElementById('app');

  // ยังไม่รู้ผลว่าล็อกอินค้างไว้จาก session เดิมหรือเปล่า — ไม่โชว์อะไรเลยดีกว่าโชว์หน้า login
  // วาบแล้วหายไปทันทีถ้าจริงๆ มี session ค้างอยู่
  if (!state.auth.ready) {
    app.innerHTML = '';
    return;
  }

  // ยังไม่ได้ล็อกอิน — โชว์หน้า login แทนแดชบอร์ดทั้งหมด
  if (!state.auth.session) {
    app.innerHTML = renderLogin();
    bindLoginForm();
    return;
  }

  app.innerHTML = `
    ${renderTopbar()}
    <div class="main">
      <div class="content-card">
        <h1>${state.pageFilter === 'all' ? 'Dashboard' : pageById(state.pageFilter).name}</h1>
        ${renderPageChips()}
        ${renderTopTabs()}
        ${renderSubnav()}
        ${renderToolbar()}
        <div id="listWrap">${renderList()}</div>
      </div>
    </div>
    ${state.postPanel.open ? renderPostPanel() : ''}
  `;
  bindAllReplyBoxes();
  bindSearchInput();
}

/* ============================================================
   RENDER: LOGIN SCREEN
   ทีมมีหลายคน ใช้คนละไอดีกันเข้า — บัญชีสร้างโดยแอดมินเท่านั้น ไม่มีปุ่มสมัครเองในหน้านี้
============================================================ */
// พื้นหลังหน้า login ตามธีมที่เลือก: "หมีเนวี่" ใช้ลายอุ้งเท้าหมี, "พีชเฮเซลนัท" (ธีมเดิม) ใช้ลายดาว
// เดิม — ทั้งคู่ไล่สีตามโหมดสว่าง/มืดด้วย เรียงเป็นแพทเทิร์นซ้ำเต็มพื้นหลัง
const LOGIN_PAW_COLORS = ['#02314B', '#679CBE', '#C21121', '#02314B'];
const LOGIN_PAW_COLORS_DARK = ['#679CBE', '#E3B94A', '#C21121', '#679CBE'];
const LOGIN_STAR_PATH = 'M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14 2 9.27l6.91-1.01L12 2z';
const LOGIN_STAR_COLORS = ['#78A5CE', '#FFF0D9', '#DDA4B4', '#7C5549'];
const LOGIN_STAR_COLORS_DARK = ['#9CC3E3', '#4A3A30', '#E8B9C5', '#8B6559'];
// วาดอุ้งเท้า 1 ดวง: เบาะฝ่าเท้า (ellipse) + นิ้ว 4 นิ้ว (circle) ล้อมด้านบน
function pawShape(color){
  return `
    <ellipse cx="0" cy="4" rx="6.5" ry="5.2" fill="${color}"/>
    <circle cx="-6.5" cy="-4.5" r="2.6" fill="${color}"/>
    <circle cx="-2.4" cy="-7" r="2.6" fill="${color}"/>
    <circle cx="2.4" cy="-7" r="2.6" fill="${color}"/>
    <circle cx="6.5" cy="-4.5" r="2.6" fill="${color}"/>
  `;
}
function starShape(color){
  return `<path d="${LOGIN_STAR_PATH}" transform="translate(-12,-12)" fill="${color}" stroke="rgba(124,85,73,.18)" stroke-width="0.6"/>`;
}
function renderLoginStars(){
  const dark = getThemeMode() === 'dark';
  const isPeach = getThemeName() === 'peachHazelnut';
  const colors = isPeach
    ? (dark ? LOGIN_STAR_COLORS_DARK : LOGIN_STAR_COLORS)
    : (dark ? LOGIN_PAW_COLORS_DARK : LOGIN_PAW_COLORS);
  const shapeFn = isPeach ? starShape : pawShape;
  // 4 รูปทรง คนละสี ต่อ 1 ช่องลาย (tile) ขนาดเล็กลง ให้ดูเป็นลายพื้นผิวแบบเบาๆ (ไม่แย่งซีนกล่อง login)
  const dots = [
    { x: 22,  y: 22,  scale: .95, rot: -12, color: colors[0] },
    { x: 100, y: 30,  scale: .8,  rot: 18,  color: colors[1] },
    { x: 28,  y: 102, scale: .85, rot: 24,  color: colors[2] },
    { x: 104, y: 106, scale: .75, rot: -20, color: colors[3] },
  ];
  const shapes = dots.map((d) => `
    <g transform="translate(${d.x},${d.y}) rotate(${d.rot}) scale(${d.scale})">
      ${shapeFn(d.color)}
    </g>
  `).join('');
  return `
    <svg class="login-stars" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="loginStarTile" width="130" height="130" patternUnits="userSpaceOnUse">
          ${shapes}
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#loginStarTile)" opacity=".4"/>
    </svg>
  `;
}

function renderLogin(){
  const a = state.auth;
  return `
    <div class="login-wrap">
      ${renderLoginStars()}
      <form class="login-card" id="loginForm">
        <div class="login-mark">${iconForTheme()}</div>
        <div class="login-title">CommentGG</div>
        <div class="login-sub">เข้าสู่ระบบด้วยบัญชีที่แอดมินสร้างให้</div>
        <input class="login-input" type="email" id="loginEmail" autocomplete="username" placeholder="อีเมล" value="${a.loginEmail}" required />
        <input class="login-input" type="password" id="loginPassword" autocomplete="current-password" placeholder="รหัสผ่าน" required />
        <label class="login-remember">
          <input type="checkbox" id="loginRemember" checked />
          <span>จำฉันไว้ในเครื่องนี้</span>
        </label>
        ${a.loginError ? `<div class="login-error">${ICONS.alert} ${a.loginError}</div>` : ''}
        <button class="login-btn" type="submit" ${a.loginLoading ? 'disabled' : ''}>
          ${a.loginLoading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ'}
        </button>
      </form>
    </div>
  `;
}

function bindLoginForm(){
  const form = document.getElementById('loginForm');
  if (!form) return;
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    doLogin();
  });
}

async function doLogin(){
  const emailInput = document.getElementById('loginEmail');
  const passwordInput = document.getElementById('loginPassword');
  const rememberInput = document.getElementById('loginRemember');
  const email = (emailInput?.value || '').trim();
  const password = passwordInput?.value || '';
  const remember = rememberInput ? rememberInput.checked : true;
  if (!email || !password) return;

  state.auth.loginEmail = email;
  state.auth.loginLoading = true;
  state.auth.loginError = null;
  render();

  // ติ๊ก "จำฉันไว้" → authStorage จะเขียน session ลง localStorage (อยู่ข้ามการปิดเบราว์เซอร์)
  // ไม่ติ๊ก → เขียนลง sessionStorage แทน (หายทันทีที่ปิดแท็บ/เบราว์เซอร์) — ต้องตั้งค่านี้ไว้
  // "ก่อน" signInWithPassword เสมอ เพราะ session ใหม่จะถูกเขียนตอนนั้นเลย
  rememberMe = remember;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    state.auth.loginLoading = false;
    // เผื่อ error.message ว่างเปล่า/ไม่มี (เช่น error 500 จากฝั่งเซิร์ฟเวอร์ที่ไม่ส่งรายละเอียดกลับมา)
    // ไม่ให้กล่อง error โชว์ว่างเปล่าไม่มีข้อความเลย
    const msg = (error.message || '').trim();
    state.auth.loginError = msg === 'Invalid login credentials'
      ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'
      : (msg || `เข้าสู่ระบบไม่สำเร็จ${error.status ? ` (${error.status})` : ''} ลองใหม่อีกครั้ง`);
    render();
    return;
  }
  // เดี๋ยว onAuthStateChange (ผูกไว้ตอนเริ่มสคริปต์) จะรับ session ใหม่แล้ว render()/loadData() ต่อเอง
  state.auth.loginLoading = false;
  state.auth.loginError = null;
}

/* ============================================================
   POPOVER: ดูคอมเมนต์เดี่ยวๆ พร้อมบริบทของโพสต์ต้นทาง จาก Facebook
   ============================================================
   กดแว่นขยายที่แถวไหน ก็ดึงคอมเมนต์นั้น + โพสต์ต้นทาง สดจาก Facebook Graph API ผ่าน
   /api/post-detail มาโชว์เป็นการ์ดเล็กๆ ลอยอยู่ตรงแถวที่กด (ไม่ใช่มุมจอ) ได้เลย — รูป/แคปชั่น
   ของโพสต์ต้นทางถ้ามี, รูปแนบของคอมเมนต์ถ้ามี, ข้อความคอมเมนต์เต็ม, ชื่อ, เวลา, ลิงก์เปิดบน
   Facebook, ปุ่มคัดลอก comment ID — ไม่ต้องออกไปเปิด Facebook เอง และไม่ต้องโหลดคอมเมนต์อื่นๆ
============================================================ */
function openPostPanel(item, anchorRect){
  // จัดตำแหน่งการ์ดให้เริ่มจากขอบซ้ายของปุ่มที่กด ยื่นไปทางขวา (ไม่ยื่นไปทางซ้ายทับแถวคอมเมนต์/
  // กล่องข้อความที่เปิดอยู่) แล้วอยู่ใต้ปุ่มลงมานิดหน่อย — กันชนขอบขวา/ขอบล่างจอด้วย
  //
  // สำคัญ: .post-panel เป็น position:fixed (อ้างอิงกับ viewport) ไม่ใช่ position:absolute
  // (อ้างอิงกับเอกสารทั้งหน้า) ดังนั้นห้ามบวก window.scrollY เข้าไปในค่า top/left เด็ดขาด —
  // getBoundingClientRect() คืนค่าตำแหน่งเทียบกับ viewport อยู่แล้ว พอดีกับ fixed positioning
  // ทันที เมื่อก่อนบวก scrollY ซ้ำเข้าไปทำให้การ์ดเลื่อนลงไปนอกจอเรื่อยๆ ตามระยะที่เลื่อนหน้าลง
  const CARD_W = 300;
  const MIN_H = 220; // เผื่อพื้นที่ขั้นต่ำที่พอจะแสดงอะไรได้บ้างก่อนต้องเลื่อนภายในการ์ด
  const GAP = 8;
  let left = anchorRect.left;
  left = Math.max(12, Math.min(left, window.innerWidth - CARD_W - 12));

  const spaceBelow = window.innerHeight - anchorRect.bottom - GAP - 12;
  const spaceAbove = anchorRect.top - GAP - 12;
  // เปิดด้านล่างเป็นค่าเริ่มต้น เว้นแต่ด้านล่างเหลือพื้นที่น้อยกว่าขั้นต่ำ แต่ด้านบนมีเยอะกว่า
  const openAbove = spaceBelow < MIN_H && spaceAbove > spaceBelow;
  const top = openAbove ? 12 : anchorRect.bottom + GAP;
  // ความสูงสูงสุดที่การ์ดจะขยายได้จริง โดยไม่มีวันพ้นขอบล่างจอ — คำนวณจาก top ที่เลือกจริง
  // ไม่ใช่ค่าคงที่ลอยๆ (เนื้อหาข้างในยาวแค่ไหนก็ไม่หลุดจอ เพราะ .post-panel-body เลื่อนเองได้)
  const maxHeight = openAbove
    ? Math.max(160, anchorRect.top - GAP - 12 - 12)
    : Math.max(160, window.innerHeight - top - 12);

  state.postPanel = {
    open: true,
    loading: true,
    error: null,
    data: null,
    top,
    left,
    maxHeight,
  };
  render();

  fetch(`/api/post-detail?itemId=${encodeURIComponent(item.id)}`, { headers: apiAuthHeaders() })
    .then(async (res) => {
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'โหลดคอมเมนต์ไม่สำเร็จ');
      state.postPanel.loading = false;
      state.postPanel.data = data;
      render();
    })
    .catch((err) => {
      state.postPanel.loading = false;
      state.postPanel.error = err.message || 'โหลดคอมเมนต์ไม่สำเร็จ';
      render();
    });
}

function closePostPanel(){
  state.postPanel.open = false;
  render();
}

function copyCommentId(){
  const id = state.postPanel.data && state.postPanel.data.commentId;
  if (!id) return;
  navigator.clipboard?.writeText(id).catch(() => {});
  showToast('คัดลอก comment ID แล้ว', 'success');
}

function renderPostPanel(){
  const p = state.postPanel;
  let body = '';

  if (p.loading) {
    body = `<div class="post-panel-msg">${ICONS.inbox} กำลังโหลด...</div>`;
  } else if (p.error) {
    body = `<div class="post-panel-msg error">${ICONS.alert} ${p.error}</div>`;
  } else if (p.data) {
    const d = p.data;
    const post = d.post;
    body = `
      ${post && post.fullPicture ? `<img class="ppc-image" src="${post.fullPicture}" alt="" />` : ''}
      ${post && post.message ? `<div class="ppp-caption">${post.message}</div>` : ''}
      ${d.images && d.images.length ? d.images.map((src) => `<img class="ppc-image" src="${src}" alt="" />`).join('') : ''}
      <div class="ppc-body">
        <div class="ppc-label">คอมเมนต์นี้</div>
        ${d.message ? `<div class="ppc-message">${d.message}</div>` : `<div class="ppc-message dim">(ไม่มีข้อความ)</div>`}
        <div class="ppc-from">${d.from || 'ไม่ทราบชื่อ'}</div>
        ${d.createdTime ? `<div class="ppc-time">${timeAgo(d.createdTime)}</div>` : ''}
      </div>
      ${d.permalinkUrl ? `<a class="ppp-link" href="${d.permalinkUrl}" target="_blank" rel="noopener">${ICONS.reply} View on Facebook</a>` : ''}
    `;
  }

  return `
    <div class="post-panel-backdrop" data-action="close-post-panel"></div>
    <div class="post-panel" data-action="stop-propagation" style="top:${p.top}px; left:${p.left}px; max-height:${p.maxHeight}px;">
      <div class="post-panel-head">
        <div class="pph-copy" data-action="copy-comment-id">${ICONS.copy} Copy comment ID</div>
        <div class="modal-close" data-action="close-post-panel">${ICONS.x}</div>
      </div>
      <div class="post-panel-body">${body}</div>
    </div>
  `;
}

function bindAllReplyBoxes(){
  if (state.expandedId == null) return;
  const item = ITEMS.find(i => i.id === state.expandedId);
  if (!item || item.status === 'spam_hidden') return;
  const box = document.getElementById('replyBox-' + item.id);
  if (!box) return;
  const page = pageById(item.pageId);
  box.addEventListener('input', () => updateComposerState(item, box, page));
  box.focus();
  box.setSelectionRange(0, 0); // วางเคอร์เซอร์ไว้หน้าลายเซ็นที่แทรกไว้ล่วงหน้า พิมพ์ข้อความนำหน้าได้เลย
  updateComposerState(item, box, page);
}

function bindSearchInput(){
  const input = document.getElementById('searchInput');
  if (!input) return;
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  input.addEventListener('input', () => { state.search = input.value; state.page = 1; renderListOnly(); });
}

function renderListOnly(){
  // re-render only the list + toolbar counts area to avoid losing search input focus
  document.getElementById('listWrap').innerHTML = renderList();
  bindAllReplyBoxes();
}

function updateComposerState(item, box, page){
  const alertZone = document.getElementById('composerAlertZone-' + item.id);
  const sendBtn = document.getElementById('sendBtn-' + item.id);
  const sendArchiveBtn = document.getElementById('sendArchiveBtn-' + item.id);
  const setDisabled = (val) => { sendBtn.disabled = val; if (sendArchiveBtn) sendArchiveBtn.disabled = val; };
  const text = box.value;
  const violation = checkCrossPageViolation(text, page.id);
  const endingViolation = !violation ? checkEndingViolation(text, page) : null;
  if (violation) {
    box.classList.add('violate');
    alertZone.innerHTML = `
      <div class="composer-alert">
        ${ICONS.alert}
        <div>
          <b>⚠️ ตรวจพบ${violation.type}ของ ${violation.page.emoji} ${violation.page.name}</b> ("${violation.term}")
          ในข้อความที่กำลังตอบเพจ ${page.emoji} ${page.name} — ระบบบล็อกการส่งเพื่อป้องกันการตอบผิดเพจ
        </div>
      </div>
    `;
    setDisabled(true);
  } else if (endingViolation) {
    box.classList.add('violate');
    alertZone.innerHTML = `
      <div class="composer-alert">
        ${ICONS.alert}
        <div>
          <b>⚠️ คำลงท้ายไม่ตรงกับเพจนี้</b> — เพจ ${page.emoji} ${page.name} ต้องใช้ “${page.ending}” แต่พบคำว่า “${endingViolation.term}” ในข้อความ กรุณาแก้ไขก่อนส่ง
        </div>
      </div>
    `;
    setDisabled(true);
  } else {
    // ไม่บล็อกการส่งแม้ identity เพจตัวเองจะยังไม่ครบ (บางทีตอบแบบไม่มีสรรพนามก็ได้) — เอาข้อความ
    // เตือนเฉยๆ (composer-hint-neutral/ok) ออกไปตามที่ขอ เหลือแค่ตัวเตือนที่บล็อกการส่งจริงด้านบน
    box.classList.remove('violate');
    alertZone.innerHTML = '';
    setDisabled(false);
  }
}

/* ============================================================
   EVENT DELEGATION
============================================================ */
// เก็บ "ancestor ที่มี data-action" ของ mousedown ล่าสุดไว้เทียบกับตอน click (ไม่ใช่ raw target ตรงๆ
// เพราะปุ่มไอคอนอย่างกากบาท modal-close มักคลิกโดนตัว <svg>/<path> ข้างในซึ่งเป็นคนละ element กับ
// div ที่มี data-action จริงๆ — เทียบ raw target ตรงๆ เลยทำให้กดกากบาทไม่ติด ต้องเทียบที่ closest
// ancestor แทน) กันบั๊ก: ลาก/เลือกข้อความเริ่มจากข้างใน modal (เช่น select ข้อความในช่อง input)
// แล้วปล่อยเมาส์ออกไปโดนพื้นหลังนอกกล่อง จะถูกนับเป็น "คลิกที่พื้นหลัง" แล้วปิด modal ทันที ทั้งที่
// ผู้ใช้แค่ลากเลือกข้อความอยู่ ไม่ได้ตั้งใจปิดกล่องเลย
let lastMouseDownTarget = null;
document.getElementById('app').addEventListener('mousedown', (e) => {
  lastMouseDownTarget = e.target.closest('[data-action]');
});

// select/input[type=date] ในแผง Filters ใช้ event "change" (ไม่ใช่ "click" เหมือน data-action อื่นๆ
// ทั้งหมด) เลยแยก listener ต่างหาก แต่ยังใช้ data-action="set-filter" + data-key ตัวเดียวกันเพื่อให้
// อ่านง่ายสอดคล้องกับแพทเทิร์นเดิม
document.getElementById('app').addEventListener('change', (e) => {
  const el = e.target.closest('[data-action="set-filter"]');
  if (!el) return;
  state.filters[el.dataset.key] = el.value;
  state.page = 1;
  render();
});

const BACKDROP_CLOSE_ACTIONS = new Set(['close-profile', 'close-post-panel', 'close-user-menu', 'close-filters']);

document.getElementById('app').addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id || null;
  const item = id ? ITEMS.find(i => i.id === id) : null;

  // ปิด modal/dropdown จากการคลิกพื้นหลังได้ ก็ต่อเมื่อ mousedown กับ click จบที่จุดเดียวกันจริงๆ
  // (กันลากเลือกข้อความข้างในกล่องแล้วปล่อยเมาส์นอกกล่อง ไม่ให้นับเป็นการคลิกปิด)
  if (BACKDROP_CLOSE_ACTIONS.has(action) && lastMouseDownTarget !== el) {
    return;
  }

  switch (action) {
    case 'stop-propagation':
      break;

    case 'toggle-user-menu':
      state.userMenuOpen = !state.userMenuOpen;
      render(); break;

    case 'close-user-menu':
      state.userMenuOpen = false;
      render(); break;

    case 'menu-placeholder':
      state.userMenuOpen = false;
      showToast(`"${el.dataset.label}" จะเปิดใช้งานเร็วๆ นี้`);
      render(); break;

    case 'sign-out':
      state.userMenuOpen = false;
      sb.auth.signOut(); // onAuthStateChange ด้านล่างจะเคลียร์ session + พาไปหน้า login เอง
      break;

    case 'open-profile':
      state.userMenuOpen = false;
      state.profileOpen = true;
      state.profileTab = el.dataset.tab || 'profile';
      render(); break;

    case 'close-profile':
      state.profileOpen = false;
      render(); break;

    case 'profile-tab':
      state.profileTab = el.dataset.tab;
      render(); break;

    case 'save-profile': {
      const firstName = document.getElementById('pf-firstName').value.trim() || state.profile.firstName;
      const lastName = document.getElementById('pf-lastName').value.trim();
      state.profile = { firstName, lastName, email: state.profile.email };

      // เก็บชื่อ-นามสกุลลง user_metadata ของบัญชี Supabase Auth จริง (ไม่ใช่แค่ state.profile
      // ในเครื่อง) จะได้โชว์เป็นชื่อในหัวเว็บ (topbar) แทนอีเมล อยู่ถาวรข้ามการรีเฟรชหน้า/ล็อกอินใหม่
      sb.auth.updateUser({ data: { first_name: firstName, last_name: lastName } }).catch((err) => {
        console.error('บันทึกโปรไฟล์ไม่สำเร็จ:', err);
      });

      // อ่านค่าจากช่องกรอกก่อนปิด modal (พอปิด/render ใหม่ input พวกนี้จะหายไปจาก DOM)
      // แล้วเก็บเฉพาะเพจที่แฮชแท็ก "ของฉัน" มีการแก้ไขจริง
      const changedPages = [];
      PAGES.forEach(page => {
        const input = document.getElementById('pf-hashtag-' + page.id);
        if (!input) return;
        const newHashtag = input.value.trim();
        if (newHashtag !== myHashtagFor(page.id)) changedPages.push({ page, newHashtag });
      });

      state.profileOpen = false;
      render();

      if (changedPages.length === 0) {
        showToast('บันทึกโปรไฟล์เรียบร้อยแล้ว', 'success');
        break;
      }

      Promise.all(changedPages.map(({ page, newHashtag }) =>
        saveMyHashtag(page.id, newHashtag).then(() => { MY_HASHTAGS[page.id] = newHashtag; })
      ))
        .then(() => {
          showToast('บันทึกโปรไฟล์และแฮชแท็กเรียบร้อยแล้ว', 'success');
          render();
        })
        .catch((err) => {
          console.error('บันทึกแฮชแท็กไม่สำเร็จ:', err);
          showToast(err.message || 'บันทึกแฮชแท็กบางเพจไม่สำเร็จ ลองใหม่อีกครั้ง', 'error');
        });
      break;
    }

    // เปลี่ยนรหัสผ่านของบัญชีตัวเองที่ล็อกอินอยู่ตอนนี้ ผ่าน Supabase Auth โดยตรง (ใช้ JWT ของ
    // ผู้ใช้เอง ไม่ต้องผ่าน service key ฝั่งเซิร์ฟเวอร์ เพราะแก้ได้แค่บัญชีตัวเองเท่านั้นอยู่แล้ว)
    case 'change-password': {
      const p1 = document.getElementById('pf-newPassword');
      const p2 = document.getElementById('pf-newPassword2');
      const newPassword = p1 ? p1.value : '';
      const confirmPassword = p2 ? p2.value : '';
      if (!newPassword || newPassword.length < 6) {
        showToast('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        showToast('รหัสผ่านที่ยืนยันไม่ตรงกัน', 'error');
        return;
      }
      el.disabled = true;
      sb.auth.updateUser({ password: newPassword }).then(({ error }) => {
        el.disabled = false;
        if (error) {
          showToast(error.message || 'เปลี่ยนรหัสผ่านไม่สำเร็จ', 'error');
          return;
        }
        if (p1) p1.value = '';
        if (p2) p2.value = '';
        showToast('เปลี่ยนรหัสผ่านแล้ว', 'success');
      });
      break;
    }

    case 'select-page':
      state.pageFilter = el.dataset.page;
      state.expandedId = null; state.selected.clear(); state.page = 1;
      render(); break;

    case 'select-tab':
      state.tab = el.dataset.tab;
      state.folder = 'inbox'; state.expandedId = null; state.selected.clear(); state.page = 1;
      render(); break;

    case 'select-folder':
      state.folder = el.dataset.folder;
      state.expandedId = null; state.selected.clear(); state.page = 1;
      render(); break;

    case 'goto-page': {
      const p = parseInt(el.dataset.page, 10);
      if (!Number.isNaN(p)) { state.page = p; state.expandedId = null; render(); }
      break;
    }

    case 'toggle-sort':
      state.sortDesc = !state.sortDesc;
      showToast(state.sortDesc ? 'เรียงล่าสุดก่อน' : 'เรียงเก่าสุดก่อน');
      render(); break;

    case 'toggle-search':
      state.searchOpen = true;
      render(); break;

    case 'toggle-filters':
      state.filtersOpen = !state.filtersOpen;
      render(); break;

    case 'close-filters':
      state.filtersOpen = false;
      render(); break;

    case 'clear-filters':
      state.filters = { status: 'all', blocked: 'all', dateRange: 'all', dateFrom: '', dateTo: '' };
      state.page = 1;
      render(); break;

    case 'set-theme-mode':
      setThemeMode(el.dataset.mode);
      render(); break;

    case 'set-theme-name':
      setThemeName(el.dataset.theme);
      render(); break;

    case 'select-all': {
      const items = visibleItems();
      const allSelected = items.length > 0 && items.every(i => state.selected.has(i.id));
      if (allSelected) items.forEach(i => state.selected.delete(i.id));
      else items.forEach(i => state.selected.add(i.id));
      render(); break;
    }

    case 'toggle-select':
      if (state.selected.has(id)) state.selected.delete(id); else state.selected.add(id);
      render(); break;

    case 'clear-selection':
      state.selected.clear();
      state.bulkMenuOpen = false;
      render(); break;

    case 'toggle-bulk-menu':
      state.bulkMenuOpen = !state.bulkMenuOpen;
      render(); break;

    case 'close-bulk-menu':
      state.bulkMenuOpen = false;
      render(); break;

    case 'bulk-archive':
      state.selected.forEach(sid => { const it = ITEMS.find(i => i.id === sid); if (it) it.folder = 'archive'; protectedPatch(sid, { folder: 'archive' }); });
      showToast(`ย้าย ${state.selected.size} รายการไป Archive แล้ว`, 'success');
      state.selected.clear(); state.bulkMenuOpen = false; render(); break;

    case 'bulk-bin':
      state.selected.forEach(sid => { const it = ITEMS.find(i => i.id === sid); if (it) it.folder = 'bin'; protectedPatch(sid, { folder: 'bin' }); });
      showToast(`ย้าย ${state.selected.size} รายการไปถังขยะแล้ว`, 'success');
      state.selected.clear(); state.bulkMenuOpen = false; render(); break;

    case 'toggle-expand':
      state.expandedId = state.expandedId === id ? null : id;
      render(); break;

    case 'view-post':
      if (item) openPostPanel(item, el.getBoundingClientRect());
      break;

    case 'close-post-panel':
      closePostPanel();
      break;

    case 'copy-comment-id':
      copyCommentId();
      break;

    case 'start-edit-reply':
      state.editingReplyId = id;
      render();
      // เอาโฟกัสไปที่กล่องแก้ไข + วางเคอร์เซอร์ท้ายข้อความ ให้พิมพ์ต่อได้เลย
      setTimeout(() => {
        const box = document.getElementById('replyEditBox-' + id);
        if (box) { box.focus(); box.setSelectionRange(box.value.length, box.value.length); }
      }, 0);
      break;

    case 'cancel-edit-reply':
      state.editingReplyId = null;
      render();
      break;

    case 'save-edit-reply': {
      const box = document.getElementById('replyEditBox-' + id);
      const newText = box ? box.value.trim() : '';
      if (!newText) { showToast('ข้อความต้องไม่ว่างเปล่า', 'error'); return; }
      saveEditedReply(item, newText);
      break;
    }

    case 'delete-reply':
      if (item) deleteAdminReply(item);
      break;

    case 'collapse':
      state.expandedId = null;
      render(); break;

    case 'hide':
      if (item) setCommentHidden(item, true);
      break;

    case 'unhide':
      if (item) setCommentHidden(item, false);
      break;

    case 'bin':
      item.folder = 'bin';
      state.expandedId = null;
      protectedPatch(item.id, { folder: 'bin' });
      showToast('ย้ายไปถังขยะแล้ว', 'success');
      render(); break;

    case 'restore':
      item.folder = 'inbox';
      protectedPatch(item.id, { folder: 'inbox' });
      showToast('กู้คืนรายการแล้ว', 'success');
      render(); break;

    case 'delete-forever':
      ITEMS = ITEMS.filter(i => i.id !== id);
      protectedDelete(id);
      showToast('ลบถาวรแล้ว', 'success');
      render(); break;

    case 'archive':
      item.folder = 'archive';
      protectedPatch(item.id, { folder: 'archive' });
      showToast('ย้ายไป Archive แล้ว', 'success');
      render(); break;

    case 'unarchive':
      item.folder = 'inbox';
      protectedPatch(item.id, { folder: 'inbox' });
      showToast('ย้ายกลับ Inbox แล้ว', 'success');
      render(); break;

    case 'copy':
      navigator.clipboard?.writeText(item.text).catch(() => {});
      showToast('คัดลอกข้อความแล้ว', 'success');
      break;

    case 'insert-signature': {
      const page = pageById(item.pageId);
      const box = document.getElementById('replyBox-' + id);
      const sig = signatureFor(page);
      const pos = box.selectionStart ?? box.value.length;
      box.value = box.value.slice(0, pos) + sig + box.value.slice(pos);
      box.focus();
      box.setSelectionRange(pos + sig.length, pos + sig.length);
      updateComposerState(item, box, page);
      break;
    }

    case 'send': {
      const page = pageById(item.pageId);
      const box = document.getElementById('replyBox-' + id);
      const text = box.value.trim();
      if (!text) { showToast('กรุณาพิมพ์ข้อความก่อนส่ง', 'error'); return; }
      const violation = checkCrossPageViolation(text, page.id);
      if (violation) { showToast(`ส่งไม่สำเร็จ: พบคำของเพจอื่น ("${violation.term}") กรุณาแก้ไขก่อนส่ง`, 'error'); return; }
      const endingViolation = checkEndingViolation(text, page);
      if (endingViolation) { showToast(`ส่งไม่สำเร็จ: เพจนี้ต้องใช้คำลงท้าย "${page.ending}" ไม่ใช่ "${endingViolation.term}"`, 'error'); return; }
      sendReply(item, text);
      break;
    }

    case 'send-archive': {
      const page = pageById(item.pageId);
      const box = document.getElementById('replyBox-' + id);
      const text = box.value.trim();
      if (!text) { showToast('กรุณาพิมพ์ข้อความก่อนส่ง', 'error'); return; }
      const violation = checkCrossPageViolation(text, page.id);
      if (violation) { showToast(`ส่งไม่สำเร็จ: พบคำของเพจอื่น ("${violation.term}") กรุณาแก้ไขก่อนส่ง`, 'error'); return; }
      const endingViolation = checkEndingViolation(text, page);
      if (endingViolation) { showToast(`ส่งไม่สำเร็จ: เพจนี้ต้องใช้คำลงท้าย "${page.ending}" ไม่ใช่ "${endingViolation.term}"`, 'error'); return; }
      sendReply(item, text, true);
      break;
    }
  }
});

// เช็ค session ที่อาจค้างอยู่จากครั้งก่อน (authStorage เช็คทั้ง localStorage/sessionStorage ให้เอง
// ไม่ว่าครั้งก่อนจะติ๊ก "จำฉันไว้" หรือไม่ก็ตาม) ก่อนตัดสินใจว่าจะโชว์หน้า login หรือแดชบอร์ดเลย
sb.auth.getSession().then(({ data }) => {
  state.auth.session = data.session || null;
  state.auth.ready = true;
  render();
  if (state.auth.session) loadData();
});

// ฟังการเปลี่ยนแปลงสถานะล็อกอิน (ล็อกอินสำเร็จ, ออกจากระบบ, token หมดอายุแล้วต่ออายุอัตโนมัติ ฯลฯ)
// แล้วอัปเดตหน้าจอให้ตรงกับสถานะล่าสุดเสมอ ไม่ต้องรีเฟรชหน้าเอง
sb.auth.onAuthStateChange((event, session) => {
  const hadSession = !!state.auth.session;
  state.auth.session = session || null;
  state.auth.ready = true;
  if (!session) {
    // ออกจากระบบ (หรือ token ใช้ไม่ได้แล้ว) — เคลียร์ข้อมูลเก่าทิ้ง กันเห็นข้อมูลของบัญชีก่อนหน้า
    PAGES = [];
    ITEMS = [];
    state.auth.loginEmail = '';
    state.auth.loginError = null;
  }
  render();
  if (session && !hadSession) loadData();
});

// ระหว่างที่ผู้ใช้กำลังพิมพ์/แก้ไขอะไรอยู่ (กล่องตอบกลับ, แก้ไขคำตอบเดิม, หรือเปิด Account settings
// อยู่) ห้ามให้ poll ทุก 20 วิ ดึงข้อมูลมา render() ทับกลางคัน — ไม่งั้น input จะถูกสร้างใหม่จาก
// ค่าเดิม (ที่ยังไม่ได้บันทึก) ทำให้สิ่งที่พิมพ์ค้างอยู่หายไป/เคอร์เซอร์กระโดด เหมือนพิมพ์ไม่ติด
function isUserEditingSomething(){
  // เช็คโฟกัสจริงของช่องค้นหาด้วย (ไม่ใช่แค่ state.searchOpen เพราะกล่องค้นหาไม่มีปุ่มปิดเลย เปิดแล้ว
  // จะเป็น true ค้างตลอดทั้ง session — ถ้าใช้ค่านั้นตรงๆ จะกลายเป็นหยุด poll ถาวรทันทีที่เคยกดค้นหา
  // สักครั้ง) เดิม poll เต็มรูปแบบ (render() สร้าง DOM ใหม่ทั้งหน้า) จะตัดโฟกัส/ตำแหน่งเคอร์เซอร์ในช่อง
  // ค้นหาทิ้งทุก 20 วิ ถ้าดันพิมพ์อยู่พอดี (ค่าที่พิมพ์ไม่หายเพราะเก็บใน state.search แต่โฟกัสจะหลุด
  // เหมือนพิมพ์ไม่ติด คล้ายบั๊กที่เจอใน Account settings ก่อนหน้านี้)
  const searchFocused = state.searchOpen && document.activeElement && document.activeElement.id === 'searchInput';
  return !!state.expandedId || !!state.editingReplyId || state.profileOpen || state.postPanel.open || searchFocused;
}
setInterval(() => { if (!isUserEditingSomething()) loadData(); }, 20000);
</script>
